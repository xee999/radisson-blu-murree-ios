name: Build iOS App
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm run build
      - run: npx cap sync ios
      - name: Build Xcode
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -R build/Build/Products/Release-iphoneos/App.app build/Payload
          cd build && zip -r RadissonMurree.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: Radisson-Murree-iOS-App
          path: build/RadissonMurree.ipa
